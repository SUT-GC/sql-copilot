services:
  mysql:
    image: mysql:8.4
    container_name: db-skill-copilot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: db_skill_copilot
      MYSQL_DATABASE: analytics_demo
    ports:
      - "3307:3306"
    volumes:
      - ./demo/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pdb_skill_copilot"]
      interval: 5s
      timeout: 5s
      retries: 20
